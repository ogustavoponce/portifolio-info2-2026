<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto HTML Semântico</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <header>
        <h1>Cabeçalho (Header)</h1>
    </header>

    <nav>
        <h2>Navegação (Nav)</h2>
        <a href="#">Link 1</a> | <a href="#">Link 2</a>
    </nav>

    <div class="container">
        
        <main>
            <h2>Conteúdo Principal (Main)</h2>
            
            <section>
                <h2>Seção de Conteúdo (Section)</h2>
                
                <article>
                    <h3>Artigo (Article)</h3>
                    <p>Aqui vai o conteúdo de um artigo ou notícia.</p>
                </article>
            </section>
        </main>

        <aside>
            <h2>Barra Lateral (Aside)</h2>
            <p>Avisos, links rápidos e afins.</p>
        </aside>

    </div>

    <footer>
        <h2>Rodapé (Footer)</h2>
        <p>Direitos autorais e contato.</p>
    </footer>

</body>
</html>
